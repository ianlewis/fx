name: Update Data

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date for data update (YYYY-MM-DD)"
        required: false
        default: ""
      end_date:
        description: "End date for data update (YYYY-MM-DD)"
        required: false
        default: ""
  schedule:
    - cron: "0 0 * * *"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    name: Update Data
    permissions:
      contents: write # Required to push commits with new data.
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # NOTE: Needed so we can check in the changes.
          persist-credentials: true
          ssh-key: "${{ secrets.DEPLOY_KEY }}"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".node-version"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: ".python-version"

      - env:
          UPDATE_START_DATE: ${{ github.event.inputs.start_date }}
          UPDATE_END_DATE: ${{ github.event.inputs.end_date }}
        run: make update
      - run: |
          git config --global user.name github-actions
          git config --global user.email github-actions@github.com
          git add .
          git commit -m "chore(data): update data $(date +"%Y-%m-%d")" || true
          git push
